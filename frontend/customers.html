<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - AI CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">AI CRM</div>
      <nav id="sidebar-nav"></nav>
      <div id="role-badge" class="role-badge"></div>
      <button id="logout-btn" class="btn btn-secondary logout-btn">Logout</button>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1>Customers</h1>
        <p>Manage customer records</p>
      </div>
      <div id="alert"></div>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search customers...">
        <button class="btn btn-primary" id="btn-add">Add Customer</button>
      </div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Company</th>
              <th>Date Added</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="customers-tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Customer</h2>
      <form id="customer-form">
        <input type="hidden" id="customer-id">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="full_name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="phone">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="company">
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/common.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    renderSidebar('customers');

    const modal = document.getElementById('modal');
    let customers = [];

    async function loadCustomers() {
      const search = document.getElementById('search').value;
      const q = search ? `?search=${encodeURIComponent(search)}` : '';
      customers = await apiFetch(`/api/customers${q}`);
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('customers-tbody');
      const manager = isManager();
      document.getElementById('btn-add').style.display = manager ? '' : 'none';
      tbody.innerHTML = customers.map((c) => `
        <tr>
          <td>${escapeHTML(c.full_name)}</td>
          <td>${escapeHTML(c.email)}</td>
          <td>${escapeHTML(c.phone || '-')}</td>
          <td>${escapeHTML(c.company || '-')}</td>
          <td>${formatDate(c.created_at)}</td>
          <td>
            <a href="/customer-profile.html?id=${c.id}" class="btn btn-sm btn-primary">View Profile</a>
            ${manager ? `<button class="btn btn-sm btn-secondary" onclick="editCustomer(${c.id})">Edit</button>` : ''}
            ${manager ? `<button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})">Delete</button>` : ''}
          </td>
        </tr>
      `).join('') || '<tr><td colspan="6">No customers found</td></tr>';
    }

    function openModal(title, customer = null) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('customer-id').value = customer ? customer.id : '';
      document.getElementById('full_name').value = customer ? customer.full_name : '';
      document.getElementById('email').value = customer ? customer.email : '';
      document.getElementById('phone').value = customer ? customer.phone || '' : '';
      document.getElementById('company').value = customer ? customer.company || '' : '';
      modal.classList.add('active');
    }

    window.editCustomer = (id) => {
      const c = customers.find((x) => x.id === id);
      if (c) openModal('Edit Customer', c);
    };

    window.deleteCustomer = async (id) => {
      if (!confirm('Delete this customer?')) return;
      try {
        await apiFetch(`/api/customers/${id}`, { method: 'DELETE' });
        loadCustomers();
      } catch (e) {
        showAlert('alert', e.message);
      }
    };

    document.getElementById('btn-add').onclick = () => openModal('Add Customer');
    document.getElementById('modal-cancel').onclick = () => modal.classList.remove('active');
    document.getElementById('search').oninput = () => loadCustomers();

    document.getElementById('customer-form').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('customer-id').value;
      const body = {
        full_name: document.getElementById('full_name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value || null,
        company: document.getElementById('company').value || null,
      };
      try {
        if (id) {
          await apiFetch(`/api/customers/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        } else {
          await apiFetch('/api/customers', { method: 'POST', body: JSON.stringify(body) });
        }
        modal.classList.remove('active');
        loadCustomers();
      } catch (err) {
        showAlert('alert', err.message);
      }
    };

    loadCustomers();
  </script>
</body>
</html>
