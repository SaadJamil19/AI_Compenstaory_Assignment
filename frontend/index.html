<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>
  <div class="login-card">
    <h1>AI CRM</h1>
    <p class="subtitle">Ticket Management System</p>
    <div id="alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="admin@test.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="admin123">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>
    <p style="margin-top:1rem;font-size:0.85rem;color:#64748b">
      Demo: admin@test.com / admin123 (Manager)<br>
      agent@test.com / agent123 (Agent)
    </p>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/common.js"></script>
  <script>
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await login(email, password);
        window.location.href = '/dashboard.html';
      } catch (err) {
        document.getElementById('alert').innerHTML =
          `<div class="alert alert-error">${escapeHTML(err.message)}</div>`;
      }
    });
  </script>
</body>
</html>
