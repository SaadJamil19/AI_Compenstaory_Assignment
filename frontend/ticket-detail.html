<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Detail - AI CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">AI CRM</div>
      <nav id="sidebar-nav"></nav>
      <div id="role-badge" class="role-badge"></div>
      <button id="logout-btn" class="btn btn-secondary logout-btn">Logout</button>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1 id="ticket-title">Ticket</h1>
        <p><a href="/tickets.html">&larr; Back to Tickets</a></p>
      </div>
      <div id="alert"></div>
      <div class="detail-grid" id="detail-content"></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/common.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    renderSidebar('tickets');

    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get('id');
    if (!ticketId) {
      window.location.href = '/tickets.html';
    }

    let ticket = null;
    let agents = [];

    async function loadAgents() {
      agents = await apiFetch('/api/users/agents');
    }

    async function loadTicket() {
      ticket = await apiFetch(`/api/tickets/${ticketId}`);
      document.getElementById('ticket-title').textContent = `#${ticket.id} - ${ticket.title}`;
      renderDetail();
    }

    function renderDetail() {
      const agentOptions = agents
        .map((a) => `<option value="${a.id}" ${ticket.assigned_agent_id === a.id ? 'selected' : ''}>${escapeHTML(a.full_name)}</option>`)
        .join('');
      const timeline = [...ticket.activities].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      document.getElementById('detail-content').innerHTML = `
        <div>
          <div class="detail-card">
            <h3>Description</h3>
            <p>${escapeHTML(ticket.description)}</p>
            <div class="meta-row" style="margin-top:1rem">
              ${statusBadge(ticket.status)}
              ${priorityBadge(ticket.priority)}
              <span class="badge">${escapeHTML(ticket.category)}</span>
              ${sentimentBadge(ticket.sentiment)}
            </div>
            <p style="margin-top:0.75rem;color:#64748b">
              Customer: <strong>${escapeHTML(ticket.customer_name)}</strong> |
              Created: ${formatDate(ticket.created_at)}
            </p>
          </div>
          <div class="detail-card">
            <h3>AI Reply Suggestion</h3>
            <div id="ai-suggestion-box">${ticket.ai_suggested_reply ? `<p>${escapeHTML(ticket.ai_suggested_reply)}</p>` : '<p>No suggestion generated yet.</p>'}</div>
            <button class="btn btn-secondary btn-sm" id="generate-ai-reply">Generate AI Reply Suggestion</button>
            <button class="btn btn-primary btn-sm" id="use-ai-reply" ${ticket.ai_suggested_reply ? '' : 'disabled'}>Use as Comment</button>
          </div>
          ${ticket.ai_summary ? `
          <div class="detail-card">
            <h3>AI Resolution Summary</h3>
            <p>${escapeHTML(ticket.ai_summary)}</p>
          </div>` : ''}
          <div class="detail-card">
            <h3>Activity Timeline</h3>
            <div id="activity-list">
              ${timeline.length ? timeline.map((a) => `
                <div class="timeline-item">
                  <div><span class="badge">${escapeHTML(a.action_type.replace('_', ' '))}</span> <strong>${escapeHTML(a.user_name || 'System')}</strong></div>
                  <div class="date">${formatDate(a.created_at)}</div>
                  <p>${escapeHTML(a.message)}</p>
                  ${a.old_value || a.new_value ? `<small>${escapeHTML(a.old_value || '-')} -> ${escapeHTML(a.new_value || '-')}</small>` : ''}
                </div>
              `).join('') : '<p>No activity yet.</p>'}
            </div>
            <form id="comment-form" style="margin-top:1rem">
              <div class="form-group">
                <textarea id="comment-body" placeholder="Add a comment..." required></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-sm">Add Comment</button>
            </form>
          </div>
        </div>
        <div>
          <div class="detail-card">
            <h3>Update Ticket</h3>
            <form id="update-form">
              <div class="form-group">
                <label>Status</label>
                <select id="status">
                  <option value="open">Open</option>
                  <option value="in_progress">In Progress</option>
                  <option value="resolved">Resolved</option>
                  <option value="closed">Closed</option>
                </select>
              </div>
              <div class="form-group">
                <label>Priority</label>
                <select id="priority">
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                  <option value="critical">Critical</option>
                </select>
              </div>
              <div class="form-group ${isManager() ? '' : 'hidden'}">
                <label>Assigned Agent</label>
                <select id="assigned_agent_id">
                  <option value="">Unassigned</option>
                  ${agentOptions}
                </select>
              </div>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
          </div>
        </div>
      `;

      document.getElementById('status').value = ticket.status;
      document.getElementById('priority').value = ticket.priority;

      document.getElementById('update-form').onsubmit = async (e) => {
        e.preventDefault();
        const newStatus = document.getElementById('status').value;
        const newPriority = document.getElementById('priority').value;
        const agentVal = document.getElementById('assigned_agent_id').value;
        try {
          if (newStatus !== ticket.status) {
            await apiFetch(`/api/tickets/${ticketId}/status`, {
              method: 'PATCH',
              body: JSON.stringify({ status: newStatus }),
            });
          }
          if (newPriority !== ticket.priority) {
            await apiFetch(`/api/tickets/${ticketId}`, {
              method: 'PUT',
              body: JSON.stringify({ priority: newPriority }),
            });
          }
          if (isManager()) {
            await apiFetch(`/api/tickets/${ticketId}/assign`, {
              method: 'PATCH',
              body: JSON.stringify({
                assigned_agent_id: agentVal ? parseInt(agentVal) : null,
              }),
            });
          }
          showAlert('alert', 'Ticket updated successfully', 'success');
          loadTicket();
        } catch (err) {
          showAlert('alert', err.message);
        }
      };

      document.getElementById('generate-ai-reply').onclick = async () => {
        try {
          const res = await apiFetch(`/api/tickets/${ticketId}/ai-suggest-reply`, { method: 'POST' });
          ticket.ai_suggested_reply = res.suggestion;
          document.getElementById('ai-suggestion-box').innerHTML = `<p>${escapeHTML(res.suggestion)}</p>`;
          document.getElementById('use-ai-reply').disabled = false;
        } catch (err) {
          showAlert('alert', err.message);
        }
      };

      document.getElementById('use-ai-reply').onclick = () => {
        document.getElementById('comment-body').value = ticket.ai_suggested_reply || '';
      };

      document.getElementById('comment-form').onsubmit = async (e) => {
        e.preventDefault();
        const body = document.getElementById('comment-body').value;
        try {
          await apiFetch(`/api/tickets/${ticketId}/comments`, {
            method: 'POST',
            body: JSON.stringify({ body }),
          });
          document.getElementById('comment-body').value = '';
          loadTicket();
        } catch (err) {
          showAlert('alert', err.message);
        }
      };
    }

    loadAgents().then(loadTicket);
  </script>
</body>
</html>
