<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - AI CRM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>
  <div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand">AI CRM</div><nav id="sidebar-nav"></nav><div id="role-badge" class="role-badge"></div><button id="logout-btn" class="btn btn-secondary logout-btn">Logout</button></aside>
    <main class="main-content">
      <div class="page-header"><h1>User Management</h1><p>Create agents and manage active users</p></div>
      <div id="alert"></div>
      <div class="detail-grid">
        <div class="table-card"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead><tbody id="users"></tbody></table></div>
        <div class="detail-card">
          <h3>Create User</h3>
          <form id="user-form">
            <div class="form-group"><label>Full Name</label><input id="full_name" required></div>
            <div class="form-group"><label>Email</label><input id="email" type="email" required></div>
            <div class="form-group"><label>Password</label><input id="password" type="password" required></div>
            <div class="form-group"><label>Role</label><select id="role"><option value="agent">Agent</option><option value="manager">Manager</option></select></div>
            <button class="btn btn-primary" type="submit">Create</button>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/common.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');
    if (!isManager()) window.location.href = '/dashboard.html';
    renderSidebar('users');
    async function loadUsers() {
      const users = await apiFetch('/api/users');
      document.getElementById('users').innerHTML = users.map((u) => `
        <tr><td>${escapeHTML(u.full_name)}</td><td>${escapeHTML(u.email)}</td><td>${escapeHTML(u.role)}</td><td>${u.is_active ? 'Active' : 'Inactive'}</td><td><button class="btn btn-sm btn-secondary" onclick="toggleUser(${u.id}, ${!u.is_active})">${u.is_active ? 'Deactivate' : 'Activate'}</button></td></tr>
      `).join('');
    }
    window.toggleUser = async (id, active) => {
      try { await apiFetch(`/api/users/${id}/active?is_active=${active}`, { method: 'PATCH' }); loadUsers(); }
      catch (err) { showAlert('alert', err.message); }
    };
    document.getElementById('user-form').onsubmit = async (e) => {
      e.preventDefault();
      try {
        await apiFetch('/api/users', { method: 'POST', body: JSON.stringify({ full_name: full_name.value, email: email.value, password: password.value, role: role.value }) });
        e.target.reset(); loadUsers(); showAlert('alert', 'User created', 'success');
      } catch (err) { showAlert('alert', err.message); }
    };
    loadUsers();
  </script>
</body>
</html>
